syntax = "proto3";

package inference;

option cc_generic_services = true;

// 推理状态码。
enum PredictStatusCode {
  PREDICT_STATUS_OK = 0;
  PREDICT_STATUS_INVALID_REQUEST = 1;
  PREDICT_STATUS_QUEUE_FULL = 2;
  PREDICT_STATUS_TIMEOUT = 3;
  PREDICT_STATUS_INTERNAL_ERROR = 4;
}

// RPC 信封消息类型。
enum GatewayMessageType {
  GATEWAY_MESSAGE_TYPE_UNKNOWN = 0;
  GATEWAY_MESSAGE_TYPE_REQUEST = 1;
  GATEWAY_MESSAGE_TYPE_RESPONSE = 2;
}

// RPC 服务定义，供协议层保留统一的服务语义。
service InferenceService {
  // 单个推理请求方法。
  rpc Predict(PredictRequest) returns (PredictResponse);
}

// 预测请求消息。
message PredictRequest {
  // 请求唯一标识，用于日志与问题排查。
  string request_id = 1;

  // 图像字节流，当前约定为 JPEG/PNG 等可被 stb 解码的格式。
  bytes image_bytes = 2;

  // 图像格式提示字段，不参与解码逻辑，只用于链路可观测与诊断。
  string image_format = 3;

  // 服务端等待单次请求完成的超时时间，单位为毫秒；0 表示不主动超时。
  uint32 timeout_ms = 4;
}

// 预测响应消息。
message PredictResponse {
  // 处理状态码，0 表示成功，其余值表示不同类型的失败。
  PredictStatusCode status_code = 1;

  // 错误信息，成功时为空字符串。
  string error_message = 2;

  // 预测类别 ID，成功时有效。
  int32 class_id = 3;

  // 预测置信度，成功时有效。
  float confidence = 4;

  // 与请求中的 request_id 对应，便于客户端对账。
  string request_id = 5;

  // 服务端开始处理该请求的时间戳，单位为毫秒。
  int64 server_start_ts_ms = 6;

  // 服务端结束处理该请求的时间戳，单位为毫秒。
  int64 server_end_ts_ms = 7;
}

// 统一的 TCP RPC 信封消息。
message GatewayRpcMessage {
  // 请求或响应类型。
  GatewayMessageType message_type = 1;

  // 请求与响应共享的关联 ID。
  uint64 correlation_id = 2;

  // 方法名，当前仅支持 Predict。
  string method_name = 3;

  oneof payload {
    PredictRequest predict_request = 4;
    PredictResponse predict_response = 5;
  }
}
